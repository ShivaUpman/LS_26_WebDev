<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Troll Upload Button - Bad UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>The Troll Upload Button</h1>
            <p class="subtitle">Good luck catching it...</p>
        </header>

        <div class="upload-area">
            <button id="uploadBtn" class="troll-button">Click here</button>
            <input type="file" id="fileInput" hidden>
        </div>

        <div class="stats">
            <div class="stat-box">
                <span class="stat-label">Click attempts:</span>
                <span class="stat-value" id="clickCount">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Files tortured:</span>
                <span class="stat-value" id="uploadCount">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Frustration level:</span>
                <span class="stat-value" id="frustration">🙂</span>
            </div>
        </div>

        <div class="upload-log">
            <h2>Upload History</h2>
            <ul id="logList" class="log-entries">
                <li class="log-entry empty">No victims— I mean, no files yet...</li>
            </ul>
        </div>

        <div id="confirmationModal" class="modal hidden">
            <div class="modal-content">
                <h2 id="modalTitle">Are you SURE?</h2>
                <p id="modalMessage">This action cannot be undone (jk it can)</p>
                <div class="modal-buttons">
                    <button id="confirmYes" class="btn-yes">Yes</button>
                    <button id="confirmNo" class="btn-no">No</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
